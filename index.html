<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Web Application</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            
    /* Global Styles & Animated Gradient Background */
    body {
        background: linear-gradient(-45deg, #1e1e2f, #252542, #14142b, #2c1a4d);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #ffffff;
        padding-top: 40px;
        
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Main Container Styling */
    .container {
        max-width: 500px;
        margin-bottom: 30px;
    }

    h4 {
        text-align: center;
        font-weight: 700;
        letter-spacing: 1px;
        color: #00f2fe;
        text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        margin-bottom: 20px;
    }

    h3 {
    text-align: center;
    color: #9a1fcf;
    font-weight: 720;
    margin-top: 50px;
    animation: glowPulse 3s ease-in-out infinite;
    }

        @keyframes glowPulse {
    0% { text-shadow: 0 0 0px rgba(140, 28, 189, 0); }
    50% { text-shadow: 0 0 15px rgba(140, 28, 189, 0.6); transform: scale(0.95); }
    100% { text-shadow: 0 0 0px rgba(140, 28, 189, 0); }
    }
    /* Glassmorphic Form Card Styling */
    .card.form {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        padding: 10px;
        transition: transform 0.3s ease;
    }

    .card.form:hover {
        transform: translateY(-3px);
    }

    form {
        width: 100%;
        padding: 15px;
    }

    form label h6 {
        color: #e0e0e0;
        font-weight: 600;
    }

    /* Input Field Styling */
    .input {
        width: 100%;
        background: rgba(255, 255, 255, 0.08) !important;
        border: 2px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px;
        padding: 12px;
        color: #fff !important;
        font-size: 1rem;
        transition: all 0.3s ease;
        margin-bottom: 18px;
    }

    .input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.15) !important;
        border-color: #00f2fe !important;
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    /* Buttons Styling */
    .btn-primary {
        background: linear-gradient(135deg, #0072ff, #00f2fe);
        border: none;
        border-radius: 8px;
        font-weight: 600;
        padding: 10px 25px;
        height: 46px;
        width: 100%;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        background: linear-gradient(135deg, #00f2fe, #0072ff);
    }

    /* Dynamic Task Grid Setup */
    .container-fluid {
        max-width: 1200px;
        margin-top: 20px;
        padding-bottom: 50px;
    }

    #taskList {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
        width: 100%;
        justify-content: center;
    }

    #taskList h3 {
        grid-column: 1 / -1; /* Spans across all grid columns */
        text-align: center;  /* Centers the text inside that span */
        width: 100%;
    }

    /* Generated Task Note Cards Styling */
    .noteCard.card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        width: 100% !important; /* Overrides the inline 12rem */
        margin: 0 !important; /* Handled by grid layout gaps now */
    }

    .noteCard.card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .card-body {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 160px;
        padding: 20px;
    }

    .card-title {
        color: #00f2fe;
        font-size: 0.94rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.8;
    }

    .card-text {
        color: #f0f0f0;
        font-size: 1.05rem;
        font-weight: 500;
        /* margin-vertical: 10px; */
    }

    /* Danger/Delete Button inside cards */
    .btn-danger {
        background: linear-gradient(135deg, #ff0844, #ffb199);
        border: none;
        border-radius: 6px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-danger:hover {
        transform: scale(1.03);
        box-shadow: 0 4px 12px rgba(255, 8, 68, 0.4);
    }

        </style>
</head>
<body>
    <div class="container">
        <div><h4>To-Do List:</h4></div>
        <div class="card form">
            <form action="">
                <label for="task"><h6>Add a New Task To-Do:</h6></label><br>
                <input type="text" id="task" class="input" name="task"><br>
                <button id="addBtn" class="btn btn-primary" type="button">Add</button>
            </form>
        </div>
    </div>
    <div class="container-fluid">
        <div id="taskList" >
            <div id="head" ></div>
            
        </div>
    </div>
    <script src="js-test-project.js"></script>
</body>
</html>
